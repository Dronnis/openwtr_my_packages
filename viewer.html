<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Extra Packages for OpenWrt</title>
  <link rel="icon" href="https://opkg.oldlan.ru/favicon.ico">
  <meta name="color-scheme" content="light dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* === ВСТАВЬТЕ СЮДА ВЕСЬ ВАШ CSS ИЗ ЗАПРОСА === */
    /* Для краткости здесь только ключевые дополнения */
    .loading { text-align: center; padding: 3em; color: #666; }
    .error { color: #c00; padding: 1em; background: #ffe6e6; border-radius: 5px; }
    .readme-content { margin: 1em 0; line-height: 1.6; }
    .sha256 { font-family: monospace; font-size: 11px; color: #666; word-break: break-all; }
    [data-layout="grid"] .listing table { display: none; }
    [data-layout="grid"] .grid { display: grid; }
    .grid { display: none; grid-template-columns: repeat(auto-fill, minmax(16em, 1fr)); gap: 2px; }
    .grid .entry { background: var(--bg-card, #fff); border-radius: 5px; }
    .grid .entry a { display: flex; flex-direction: column; align-items: center; padding: 1.5em; text-decoration: none; color: inherit; }
    .grid .entry a:hover { background: var(--bg-hover, #f4f9fd); }
    .grid .entry svg { width: 75px; height: 75px; margin-bottom: 1em; }
    .grid .name { text-align: center; word-break: break-word; }
  </style>
</head>
<body onload="initApp()">
  <header>
    <div class="wrapper">
      <div class="breadcrumbs" id="breadcrumbs">Folder Path</div>
      <h1 id="page-title">
        <a href="#/">/</a>
      </h1>
    </div>
  </header>

  <div class="wrapper">
    <main>
      <div id="app">
        <div class="loading">Загрузка данных...</div>
      </div>
    </main>
  </div>

  <footer>
    <a href="https://github.com" target="_blank" rel="noopener">GitHub Pages</a> |
    <span id="year"></span>
  </footer>

  <script src="js/fancy-listener.js"></script>
</body>
</html>
