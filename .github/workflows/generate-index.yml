name: Generate index.json

on:
  push:
    branches: [main]
    paths:
      - 'releases/**'
      - '*.pub'
      - '*.apk'
      - '*.gz'
      - 'changelog.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install deps
        run: pip install pyyaml
      
      - name: Generate index.json
        run: python scripts/generate_index.py
      
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update index.json [skip ci]"
          git push