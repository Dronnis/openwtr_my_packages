<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Перенаправление...</title>
  <script>
    // ⚠️ ИЗМЕНИТЕ ЭТУ СТРОКУ под текущую папку:
    // Пустая строка = корень, "releases" = /releases/, "releases/25.12.2" = вложенная
    const RELATIVE_PATH = "releases/25.12.2"; // ← МЕНЯТЬ ЗДЕСЬ
    
    // Перенаправляем на главный viewer с путём в hash
    const basePath = window.location.origin + window.location.pathname.split('/').slice(0, -1).join('/') + '/';
    const targetHash = RELATIVE_PATH ? `#/${RELATIVE_PATH}` : '#/';
    
    // Используем replace, чтобы не ломать кнопку "Назад" в браузере
    if (location.hash !== targetHash) {
      location.replace(`${basePath}index.html${targetHash}`);
    }
  </script>
  <style>
    body { 
      font-family: system-ui, sans-serif; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh; 
      margin: 0;
      background: #f3f6f7;
      color: #333;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1f26; color: #ccc; }
    }
    .loader { 
      text-align: center; 
      padding: 2em; 
    }
    .loader::after {
      content: "";
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0%, 20% { content: ""; }
      40% { content: "."; }
      60% { content: ".."; }
      80%, 100% { content: "..."; }
    }
  </style>
</head>
<body>
  <div class="loader">Перенаправление в файловый браузер</div>
  <noscript>
    <p>⚠️ Для работы требуется JavaScript. 
       <a href="/index.html">Перейти вручную</a>
    </p>
  </noscript>
</body>
</html>
