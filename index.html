<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>📁 Loading...</title>
  <link rel="icon" href="favicon.ico">
  <style>
    /* === ВСТАВЬТЕ СЮДА ВАШ ИСХОДНЫЙ CSS === */
    /* Я сократил для краткости — используйте ваш полный CSS из вопроса */
    *{padding:0;margin:0;box-sizing:border-box}
    body{font-family:Inter,system-ui,sans-serif;font-size:16px;background:#f3f6f7;min-height:100vh}
    body,a,svg,.layout.current,.go-up{color:#333;text-decoration:none}
    .wrapper{max-width:1200px;margin:0 auto}
    header,.meta{padding:0 5%}
    td a{color:#006ed3}
    td a:hover{color:#0095e4}
    th:first-child,td:first-child{width:5%}
    th:last-child,td:last-child{width:5%}
    .size,.timestamp{font-size:14px}
    header{padding:15px 0;box-shadow:0 0 20px rgba(0,0,0,.1)}
    .breadcrumbs{text-transform:uppercase;font-size:10px;letter-spacing:1px;color:#939393;margin-bottom:5px;padding-left:3px}
    h1{font-size:20px;font-family:Poppins,system-ui,sans-serif;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#c5c5c5}
    h1 a,th a{color:#000}
    h1 a:hover{background:#ffffc4}
    header,main{background:#fff}
    main{margin:3em auto 0;border-radius:5px;box-shadow:0 2px 5px rgba(0,0,0,.05)}
    .meta{display:flex;gap:1em;font-size:14px;border-bottom:1px solid #e5e9ea;padding:1em 0}
    #summary{display:flex;gap:1em;align-items:center;margin-right:auto}
    .filter-container{position:relative;display:inline-block;margin-left:1em}
    #search-icon{color:#777;position:absolute;height:1em;top:.6em;left:.5em}
    #filter{padding:.5em 1em .5em 2.5em;border:1px solid #ccc;border-radius:5px;font:inherit;position:relative;z-index:2;background:0 0}
    .layout,.layout svg{color:#9a9a9a}
    .layout.current,.layout.current svg{color:#333}
    table{width:100%;border-collapse:collapse}
    tbody tr,tbody tr a,.entry a{transition:all .15s}
    tbody tr:hover,.grid .entry a:hover{background:#f4f9fd}
    th,td{text-align:left}
    th{position:sticky;top:0;background:#fff;white-space:nowrap;z-index:2;text-transform:uppercase;font-size:14px;letter-spacing:1px;padding:.75em 0}
    td{white-space:nowrap}
    td:nth-child(2){width:75%}
    td:nth-child(2) a{padding:1em 0;display:block}
    td:nth-child(3),th:nth-child(3){padding:0 20px;min-width:150px}
    .name,.go-up{word-break:break-all;overflow-wrap:break-word;white-space:pre-wrap}
    .listing .icon{color:#454545}
    .listing .icon-folder{color:#ffb900!important}
    .sizebar{position:relative;padding:.25rem .5rem;display:flex}
    .sizebar-bar{background:#dbeeff;position:absolute;top:0;right:0;bottom:0;left:0;z-index:0;height:100%;pointer-events:none}
    .sizebar-text{position:relative;z-index:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(16em,1fr));gap:2px}
    .grid .entry{position:relative;width:100%}
    .grid .entry a{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5em;height:100%}
    .grid .entry svg{width:75px;height:75px}
    .grid .entry .name{margin-top:1em}
    footer{padding:40px 20px;font-size:12px;text-align:center}
    .hideable{display:none}@media(min-width:601px){.hideable{display:table-cell}}
    
    /* Dark mode */
    @media(prefers-color-scheme:dark){
      body{background:linear-gradient(180deg,#223242,#1a1f26);background-attachment:fixed}
      body,a,svg,.layout.current,.go-up{color:#ccc}
      h1 a,th a{color:#fff}
      h1{color:#fff}
      h1 a:hover{background:hsl(213deg 100% 73%/20%)}
      header,main{background:#101720}
      tbody tr:hover,.grid .entry a:hover{background:#162030;color:#fff}
      th{background:#18212c}
      td a,.listing .icon{color:#abc8e3}
      td a:hover{color:#fff}
      #search-icon{color:#7798c4}
      #filter{color:#fff;border-color:#29435c}
      .meta{border-bottom-color:#222e3b}
      .sizebar-bar{background:#1f3549}
    }
    .readme{margin:0 50px}
    .well{background:#e8eef4;border-radius:8px;font-size:85%;line-height:1.45;overflow:auto;padding:12px;max-width:980px}
    .code{font-family:'Lucida Console','Ubuntu Mono',monospace}
    @media(prefers-color-scheme:dark){.well{background:#090d11}}
    .loading{text-align:center;padding:3em;color:#666}
    .error{color:#c00;padding:1em;background:#ffeaea;border-radius:5px;margin:1em}
  </style>
</head>
<body>
  <header>
    <div class="wrapper">
      <div class="breadcrumbs" id="breadcrumbs"></div>
      <h1 id="page-title"><a href="?path=/">📁 Loading...</a></h1>
    </div>
  </header>
  
  <div class="wrapper">
    <main id="main-content">
      <div class="loading">🔄 Загрузка данных...</div>
    </main>
  </div>
  
  <footer>
    <a href="https://github.com/yourname/yourrepo" target="_blank" rel="noopener">GitHub Pages</a> |
    <span id="year"></span>
  </footer>

  <script>
  // === CONFIG & STATE ===
  const CONFIG = {
    jsonUrl: 'index.json',
    rootPath: '/',
    icons: {
      dir: 'folder',
      file: 'file',
      apk: 'package',
      ipk: 'package',
      gz: 'archive',
      zip: 'archive',
      tar: 'archive',
      img: 'image',
      iso: 'disc',
      pub: 'key',
      key: 'key',
      conf: 'settings',
      md: 'markdown',
      txt: 'text',
      json: 'code',
      yaml: 'code',
      js: 'code',
      css: 'code',
      html: 'code'
    }
  };

  let state = {
    data: null,
    currentPath: [],
    sort: { field: 'namedirfirst', order: 'desc' },
    layout: 'list',
    filter: ''
  };

  // === ICONS (Tabler-style SVG) ===
  const ICONS = {
    folder: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M9 3a1 1 0 0 1 .608.206l.1.087L12.414 6H19a3 3 0 0 1 3 3v8a3 3 0 0 1-3 3H5a3 3 0 0 1-3-3V6a3 3 0 0 1 3-3h4z"/></svg>`,
    file: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>`,
    package: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.89 1.45l8 4A2 2 0 0 1 22 7.24v9.53a2 2 0 0 1-1.11 1.79l-8 4a2 2 0 0 1-1.79 0l-8-4a2 2 0 0 1-1.1-1.8V7.24a2 2 0 0 1 1.11-1.79l8-4a2 2 0 0 1 1.78 0z"/><path d="M2.32 6.16l8.79 4.4a2 2 0 0 0 1.78 0l8.79-4.4"/><path d="M12 22V10.55"/></svg>`,
    archive: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8v13H3V8"/><path d="M1 3h22v5H1z"/><path d="M10 12h4"/></svg>`,
    image: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 16l5-5 4 4 5-6 4 4"/></svg>`,
    key: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16.555 3.843l3.602 3.602a2.877 2.877 0 0 1 0 4.069l-2.643 2.643a2.877 2.877 0 0 1-4.069 0l-.301-.301-6.558 6.558a2 2 0 0 1-1.239.578H5a1 1 0 0 1-1-1v-1.172a2 2 0 0 1 .586-1.414l2.414-2.414"/><circle cx="15" cy="9" r="1"/></svg>`,
    settings: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>`,
    markdown: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><path d="M8 10l2 2 2-2"/><path d="M14 10v4"/></svg>`,
    text: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>`,
    code: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 18l6-6-6-6"/><path d="M8 6l-6 6 6 6"/></svg>`,
    disc: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>`
  };

  function getIcon(name, type, info) {
    if (info?.icon && ICONS[info.icon]) return ICONS[info.icon];
    if (type === 'dir') return ICONS.folder;
    const ext = name.split('.').pop().toLowerCase();
    return ICONS[ext] || ICONS.file;
  }

  // === UTILS ===
  function formatBytes(bytes) {
    if (!bytes || bytes === 0) return '—';
    const k = 1024, sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
  }

  function formatDate(unix) {
    if (!unix) return '';
    const d = new Date(unix * 1000);
    return d.toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function parsePath(pathStr) {
    return pathStr.split('/').filter(p => p);
  }

  function getNodeAtPath(obj, path) {
    let current = obj;
    for (const part of path) {
      if (current?.[part]) current = current[part];
      else return null;
    }
    return current;
  }

  function getBreadcrumbs(path) {
    const crumbs = [{ name: '🏠', path: '/' }];
    let acc = '';
    for (const p of path) {
      acc += '/' + p;
      crumbs.push({ name: p, path: acc });
    }
    return crumbs;
  }

  function updateURL() {
    const params = new URLSearchParams();
    if (state.currentPath.length) params.set('path', '/' + state.currentPath.join('/'));
    if (state.sort.field !== 'namedirfirst') params.set('sort', state.sort.field);
    if (state.sort.order !== 'desc') params.set('order', state.sort.order);
    if (state.layout !== 'list') params.set('layout', state.layout);
    if (state.filter) params.set('filter', state.filter);
    const qs = params.toString();
    history.replaceState(state, '', qs ? '?' + qs : location.pathname);
  }

  // === DATA LOADING ===
  async function loadData() {
    try {
      const res = await fetch(CONFIG.jsonUrl);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      state.data = await res.json();
      document.title = state.data.cfg?.title || 'File Browser';
      if (state.data.cfg?.favicon) {
        document.querySelector('link[rel="icon"]')?.setAttribute('href', state.data.cfg.favicon);
      }
      // Parse initial path from URL
      const params = new URLSearchParams(location.search);
      const pathParam = params.get('path') || CONFIG.rootPath;
      state.currentPath = parsePath(pathParam);
      state.sort.field = params.get('sort') || state.data.cfg?.defaultSort || 'namedirfirst';
      state.sort.order = params.get('order') || state.data.cfg?.defaultOrder || 'desc';
      state.layout = params.get('layout') || 'list';
      state.filter = params.get('filter') || '';
      render();
    } catch (e) {
      document.getElementById('main-content').innerHTML = 
        `<div class="error">❌ Ошибка загрузки index.json: ${e.message}<br><small>Убедитесь, что файл существует и CORS разрешён.</small></div>`;
      console.error(e);
    }
  }

  // === RENDERING ===
  function render() {
    const node = getNodeAtPath(state.data.files, state.currentPath);
    if (!node) {
      document.getElementById('main-content').innerHTML = 
        `<div class="error">❌ Путь не найден: /${state.currentPath.join('/')}</div>`;
      return;
    }

    // Update UI
    document.getElementById('page-title').innerHTML = 
      `<a href="?path=/${state.currentPath.join('/')}">📁 ${state.currentPath[state.currentPath.length-1] || 'Root'}</a>`;
    
    document.getElementById('breadcrumbs').innerHTML = 
      getBreadcrumbs(state.currentPath).map(c => 
        `<a href="?path=${c.path}">${c.name}</a>`
      ).join(' / ');

    // Collect entries
    const entries = Object.entries(node).filter(([k]) => k !== '__INFO__').map(([name, data]) => {
      const info = data.__INFO__ || data;
      return {
        name,
        type: info.type || (data.__INFO__ ? 'dir' : 'file'),
        size: info.size || 0,
        date: info.date || 0,
        icon: getIcon(name, info.type, info),
        sha256: info.sha256sum,
        path: [...state.currentPath, name].join('/')
      };
    });

    // Filter
    const filtered = state.filter 
      ? entries.filter(e => e.name.toLowerCase().includes(state.filter.toLowerCase()))
      : entries;

    // Sort
    filtered.sort((a, b) => {
      // Директории всегда первыми при namedirfirst
      if (state.sort.field === 'namedirfirst') {
        if (a.type !== b.type) return a.type === 'dir' ? -1 : 1;
      }
      let cmp = 0;
      switch (state.sort.field) {
        case 'name': cmp = a.name.localeCompare(b.name); break;
        case 'size': cmp = (a.size || 0) - (b.size || 0); break;
        case 'time': cmp = (a.date || 0) - (b.date || 0); break;
        default: cmp = a.name.localeCompare(b.name);
      }
      return state.sort.order === 'desc' ? -cmp : cmp;
    });

    // Stats
    const dirCount = filtered.filter(e => e.type === 'dir').length;
    const fileCount = filtered.filter(e => e.type === 'file').length;

    // Render controls
    const controls = `
      <div class="meta">
        <div id="summary">
          <span class="meta-item"><b>${dirCount}</b> директорий</span>
          <span class="meta-item"><b>${fileCount}</b> файлов</span>
        </div>
        <a href="#" id="layout-list" class="layout ${state.layout==='list'?'current':''}">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg> Список
        </a>
        <a href="#" id="layout-grid" class="layout ${state.layout==='grid'?'current':''}">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Сетка
        </a>
      </div>
      <div class="listing">
        <table>
          <thead>
            <tr>
              <th></th>
              <th>
                <a href="#" data-sort="name">Имя ${state.sort.field==='name' ? (state.sort.order==='asc'?'▲':'▼') : ''}</a>
                <div class="filter-container">
                  <svg id="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                  <input type="text" placeholder="Поиск" id="filter" value="${state.filter}">
                </div>
              </th>
              <th><a href="#" data-sort="size">Размер ${state.sort.field==='size' ? (state.sort.order==='asc'?'▲':'▼') : ''}</a></th>
              <th class="hideable"><a href="#" data-sort="time">Изменён ${state.sort.field==='time' ? (state.sort.order==='asc'?'▲':'▼') : ''}</a></th>
              <th class="hideable"></th>
            </tr>
          </thead>
          <tbody id="entries-body"></tbody>
        </table>
      </div>
    `;

    document.getElementById('main-content').innerHTML = controls;

    // Render entries
    const tbody = document.getElementById('entries-body');
    if (state.layout === 'grid') {
      tbody.parentElement.parentElement.outerHTML = 
        `<div class="grid" id="entries-grid"></div>`;
      const grid = document.getElementById('entries-grid');
      filtered.forEach(entry => {
        const el = document.createElement('div');
        el.className = 'entry';
        el.innerHTML = `
          <a href="${entry.type==='dir' ? '?path=/' + entry.path : CONFIG.rootUrl + entry.path}" 
             title="${entry.sha256 ? 'SHA256: ' + entry.sha256 : ''}">
            ${entry.icon}
            <span class="name">${entry.name}${entry.type==='dir'?'/':''}</span>
            <span class="size">${formatBytes(entry.size)}</span>
          </a>
        `;
        grid.appendChild(el);
      });
    } else {
      // Up link if not root
      if (state.currentPath.length > 0) {
        const upRow = document.createElement('tr');
        upRow.innerHTML = `
          <td></td>
          <td><a href="?path=/${state.currentPath.slice(0,-1).join('/')}" class="go-up">⬆️ ..</a></td>
          <td>—</td>
          <td class="timestamp hideable">—</td>
          <td class="hideable"></td>
        `;
        tbody.appendChild(upRow);
      }
      
      // Size max for bars
      const maxSize = Math.max(...filtered.filter(e=>e.type==='file').map(e=>e.size||0), 1);
      
      filtered.forEach(entry => {
        const row = document.createElement('tr');
        row.className = entry.type;
        const sizePercent = entry.type === 'file' ? (entry.size / maxSize * 100) : 0;
        row.innerHTML = `
          <td></td>
          <td>
            <a href="${entry.type==='dir' ? '?path=/' + entry.path : CONFIG.rootUrl + entry.path}" 
               title="${entry.sha256 ? 'SHA256: ' + entry.sha256 : ''}">
              ${entry.icon}
              <span class="name">${entry.name}${entry.type==='dir'?'/':''}</span>
            </a>
          </td>
          <td class="size" data-size="${entry.size}">
            ${entry.type==='file' ? `
            <div class="sizebar">
              <div class="sizebar-bar" style="width:${sizePercent}%"></div>
              <div class="sizebar-text">${formatBytes(entry.size)}</div>
            </div>` : '—'}
          </td>
          <td class="timestamp hideable"><time datetime="${new Date((entry.date||0)*1000).toISOString()}">${formatDate(entry.date)}</time></td>
          <td class="hideable"></td>
        `;
        tbody.appendChild(row);
      });
    }

    // Attach events
    attachEvents();
    updateURL();
    
    // Localize times
    document.querySelectorAll('time').forEach(el => {
      const d = new Date(el.dateTime);
      if (!isNaN(d)) el.textContent = d.toLocaleString('ru-RU');
    });
  }

  function attachEvents() {
    // Filter
    const filterEl = document.getElementById('filter');
    if (filterEl) {
      filterEl.addEventListener('input', (e) => {
        state.filter = e.target.value.trim();
        render();
      });
      setTimeout(() => filterEl?.focus({ preventScroll: true }), 100);
    }

    // Sort
    document.querySelectorAll('[data-sort]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.preventDefault();
        const field = el.dataset.sort;
        if (state.sort.field === field) {
          state.sort.order = state.sort.order === 'asc' ? 'desc' : 'asc';
        } else {
          state.sort.field = field;
          state.sort.order = 'asc';
        }
        render();
      });
    });

    // Layout toggle
    document.getElementById('layout-list')?.addEventListener('click', (e) => {
      e.preventDefault();
      state.layout = 'list';
      render();
    });
    document.getElementById('layout-grid')?.addEventListener('click', (e) => {
      e.preventDefault();
      state.layout = 'grid';
      render();
    });

    // Footer year
    document.getElementById('year').textContent = new Date().getFullYear();
  }

  // Handle back/forward
  window.addEventListener('popstate', (e) => {
    if (e.state) state = e.state;
    loadData();
  });

  // Init
  document.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
